<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Navigator — Retro Grid Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #05050a;
      --panel: #0c0c18;
      --panel2: #10101f;
      --border: #1a1a30;
      --blue: #00ccff;
      --blue-glow: rgba(0,204,255,0.4);
      --red: #ff2255;
      --red-glow: rgba(255,34,85,0.4);
      --green: #00ff6a;
      --green-glow: rgba(0,255,106,0.3);
      --gold: #ffcc00;
      --gold-glow: rgba(255,204,0,0.5);
      --white: #d8d8e8;
      --muted: #44445a;
      --dim: #22223a;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══ CRT SCANLINE EFFECT ═══ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.06) 0px,
        rgba(0,0,0,0.06) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ═══ HEADER ═══ */
    .game-header {
      text-align: center;
      padding: 24px 20px 8px;
      position: relative;
    }
    .game-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      background: linear-gradient(135deg, var(--blue) 0%, var(--green) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      filter: drop-shadow(0 0 20px var(--blue-glow));
    }
    .game-header .subtitle {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      margin-top: 6px;
      text-transform: uppercase;
    }

    /* ═══ SETUP PANEL ═══ */
    .setup-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      flex-wrap: wrap;
    }
    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
    }
    .input-group label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      color: var(--blue);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .input-group input[type="number"] {
      width: 58px;
      padding: 6px 4px;
      background: var(--bg);
      border: 1px solid var(--dim);
      color: var(--white);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      text-align: center;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .input-group input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 12px var(--blue-glow);
    }

    /* ═══ BUTTONS ═══ */
    .btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      padding: 10px 20px;
      border: 2px solid;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
      background: transparent;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: currentColor;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s, opacity 0.4s;
      opacity: 0.15;
    }
    .btn:hover::before { width: 200px; height: 200px; }
    .btn:active { transform: scale(0.96); }

    .btn-cyan { color: var(--blue); border-color: var(--blue); }
    .btn-cyan:hover { background: rgba(0,204,255,0.1); box-shadow: 0 0 20px var(--blue-glow); }
    .btn-green { color: var(--green); border-color: var(--green); }
    .btn-green:hover { background: rgba(0,255,106,0.1); box-shadow: 0 0 20px var(--green-glow); }
    .btn-gold { color: var(--gold); border-color: var(--gold); }
    .btn-gold:hover { background: rgba(255,204,0,0.1); box-shadow: 0 0 20px var(--gold-glow); }
    .btn-red { color: var(--red); border-color: var(--red); }
    .btn-red:hover { background: rgba(255,34,85,0.1); box-shadow: 0 0 20px var(--red-glow); }

    .btn.active-pattern {
      background: var(--blue);
      color: var(--bg);
      box-shadow: 0 0 16px var(--blue-glow);
    }
    .pattern-switch { display: flex; gap: 6px; }

    /* ═══ LEGEND ═══ */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 8px 10px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      box-shadow: 0 0 6px currentColor;
    }

    /* ═══ HUD ═══ */
    .hud {
      display: none;
      justify-content: center;
      gap: 28px;
      padding: 14px 24px;
      margin: 8px auto 12px;
      max-width: 780px;
      background: linear-gradient(135deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
      flex-wrap: wrap;
    }
    .hud.show { display: flex; }
    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-width: 100px;
    }
    .hud-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .hud-value {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      transition: color 0.3s;
    }
    .hud-lives .hud-value { color: var(--red); }
    .hud-timer .hud-value { color: var(--gold); }
    .hud-score .hud-value { color: var(--blue); }
    .hud-level .hud-value { color: var(--green); }

    .hearts { font-size: 1.1rem; letter-spacing: 3px; }
    .heart-lost { opacity: 0.2; }

    .timer-danger { animation: timer-pulse 0.5s ease-in-out infinite; }
    @keyframes timer-pulse {
      0%, 100% { color: var(--red); }
      50% { color: var(--gold); }
    }

    /* ═══ GRID ═══ */
    .grid-wrapper {
      display: flex;
      justify-content: center;
      padding: 8px 16px 40px;
      overflow: auto;
    }
    .grid-container {
      display: inline-grid;
      gap: 1px;
      background: #08080f;
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 2px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 80px rgba(0,204,255,0.03);
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.4rem;
      border-radius: 1px;
      cursor: pointer;
      position: relative;
      transition: transform 0.12s, box-shadow 0.12s;
      user-select: none;
      aspect-ratio: 1;
    }
    .cell:not(.cell-player):hover {
      transform: scale(1.2);
      z-index: 5;
    }

    .cell-empty {
      background: #0e0e18;
      color: rgba(255,255,255,0.08);
    }
    .cell-blue {
      background: var(--blue);
      box-shadow: 0 0 8px var(--blue-glow);
      color: rgba(0,0,0,0.25);
      animation: glow-blue 2s ease-in-out infinite alternate;
    }
    @keyframes glow-blue {
      from { box-shadow: 0 0 4px var(--blue-glow); }
      to   { box-shadow: 0 0 14px var(--blue-glow); }
    }
    .cell-red {
      background: var(--red);
      box-shadow: 0 0 8px var(--red-glow);
      color: rgba(0,0,0,0.25);
    }
    .cell-green {
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
      color: rgba(0,0,0,0.25);
    }
    .cell-player {
      background: var(--gold) !important;
      box-shadow: 0 0 18px var(--gold-glow), inset 0 0 6px rgba(255,255,255,0.4) !important;
      color: #1a0a00 !important;
      font-weight: 900;
      font-size: 0.65rem !important;
      border-radius: 50% !important;
      z-index: 10;
      animation: pulse-player 1.2s ease-in-out infinite;
    }
    @keyframes pulse-player {
      0%, 100% { box-shadow: 0 0 18px var(--gold-glow); transform: scale(1); }
      50% { box-shadow: 0 0 34px var(--gold-glow), 0 0 60px rgba(255,204,0,0.2); transform: scale(1.08); }
    }

    .cell-adjacent:not(.cell-player) {
      outline: 2px solid rgba(255,204,0,0.35);
      outline-offset: -1px;
    }
    .cell-adjacent:not(.cell-player):hover {
      outline-color: rgba(255,204,0,0.8);
      box-shadow: 0 0 12px var(--gold-glow);
    }

    .cell-flash {
      animation: flash-danger 0.12s linear 5 !important;
    }
    @keyframes flash-danger {
      0%, 100% { background: var(--red); }
      50% { background: #ffffff; }
    }

    .cell-collected {
      animation: collect-pop 0.35s ease-out forwards;
    }
    @keyframes collect-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.6); background: var(--gold); box-shadow: 0 0 30px var(--gold-glow); }
      100% { transform: scale(1); background: #0e0e18; box-shadow: none; }
    }

    /* ═══ SCREEN SHAKE ═══ */
    .shake {
      animation: shake 0.35s ease-out;
    }
    @keyframes shake {
      0%  { transform: translate(0, 0); }
      15% { transform: translate(-6px, 4px); }
      30% { transform: translate(5px, -3px); }
      45% { transform: translate(-4px, 2px); }
      60% { transform: translate(3px, -2px); }
      75% { transform: translate(-2px, 1px); }
      100%{ transform: translate(0, 0); }
    }

    /* ═══ PARTICLES ═══ */
    .particle-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      animation: particle-fly 0.6s ease-out forwards;
    }
    @keyframes particle-fly {
      0%   { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
    }

    /* ═══ OVERLAY ═══ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,5,10,0.92);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .overlay.visible { opacity: 1; pointer-events: all; }

    .overlay-icon {
      font-size: 4rem;
      margin-bottom: 8px;
      animation: overlay-bounce 0.6s ease-out;
    }
    @keyframes overlay-bounce {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.3); }
      100% { transform: scale(1); opacity: 1; }
    }

    .overlay h2 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 3.5rem);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      animation: overlay-text-in 0.5s ease-out 0.15s both;
    }
    @keyframes overlay-text-in {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .overlay p {
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      animation: overlay-text-in 0.5s ease-out 0.25s both;
    }
    .overlay .btn {
      animation: overlay-text-in 0.5s ease-out 0.4s both;
      font-size: 0.85rem;
      padding: 14px 36px;
    }

    .win-text  { color: var(--green); text-shadow: 0 0 40px var(--green-glow); }
    .lose-text { color: var(--red); text-shadow: 0 0 40px var(--red-glow); }
    .lvl-text  { color: var(--blue); text-shadow: 0 0 40px var(--blue-glow); }

    .overlay-stats {
      display: flex;
      gap: 30px;
      margin-top: 4px;
      animation: overlay-text-in 0.5s ease-out 0.3s both;
    }
    .overlay-stat {
      text-align: center;
    }
    .overlay-stat-val {
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--gold);
    }
    .overlay-stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 640px) {
      .hud { gap: 14px; padding: 10px 14px; }
      .hud-value { font-size: 1rem; }
      .hud-item { min-width: 70px; }
      .setup-panel { gap: 8px; }
      .legend { gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="particle-container" id="particles"></div>

  <div class="game-header">
    <h1>Grid Navigator</h1>
    <p class="subtitle">Collect &bull; Survive &bull; Conquer</p>
  </div>

  <!-- SETUP -->
  <div class="setup-panel">
    <div class="input-group">
      <label>Rows</label>
      <input type="number" id="rowsInput" value="30" min="10" />
    </div>
    <div class="input-group">
      <label>Cols</label>
      <input type="number" id="colsInput" value="10" min="10" />
    </div>
    <button class="btn btn-cyan" onclick="generateGrid()">Generate Grid</button>
    <div class="pattern-switch">
      <button class="btn btn-green active-pattern" id="btnP1" onclick="setPattern(1)">Pattern 1</button>
      <button class="btn btn-green" id="btnP2" onclick="setPattern(2)">Pattern 2</button>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--gold);color:var(--gold)"></div> Player</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--blue);color:var(--blue)"></div> Collect</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--red);color:var(--red)"></div> Danger</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--green);color:var(--green)"></div> Safe</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#0e0e18;border:1px solid #333;color:#333"></div> Path</div>
  </div>

  <!-- HUD -->
  <div class="hud" id="hud">
    <div class="hud-item hud-lives">
      <span class="hud-label">Lives</span>
      <span class="hud-value"><span class="hearts" id="hudHearts"></span></span>
    </div>
    <div class="hud-item hud-timer">
      <span class="hud-label">Timer</span>
      <span class="hud-value" id="hudTimer">0:30</span>
    </div>
    <div class="hud-item hud-score">
      <span class="hud-label">Collected</span>
      <span class="hud-value" id="hudScore">0 / 0</span>
    </div>
    <div class="hud-item hud-level">
      <span class="hud-label">Level</span>
      <span class="hud-value" id="hudLevel">—</span>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid-wrapper" id="gridWrapper">
    <div class="grid-container" id="gridContainer"></div>
  </div>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-icon" id="overlayIcon"></div>
    <h2 id="overlayTitle"></h2>
    <p id="overlayMsg"></p>
    <div class="overlay-stats" id="overlayStats"></div>
    <button class="btn btn-gold" id="overlayBtn">Play Again</button>
  </div>

<script>
// ════════════════════════════════════════════════════
// AUDIO ENGINE (Web Audio API — no files needed)
// ════════════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, duration, type = 'square', vol = 0.1) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxCollect() { playTone(880, 0.12, 'sine', 0.12); setTimeout(() => playTone(1320, 0.1, 'sine', 0.1), 60); }
function sfxHit()     { playTone(120, 0.25, 'sawtooth', 0.15); }
function sfxMove()    { playTone(440, 0.04, 'sine', 0.04); }
function sfxWin()     { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.12), i*100)); }
function sfxLose()    { [300,250,200,150].forEach((f,i) => setTimeout(() => playTone(f, 0.25, 'sawtooth', 0.1), i*120)); }

// ════════════════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════════════════
function spawnParticles(x, y, color, count = 10) {
  const cont = document.getElementById('particles');
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 60;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = color;
    p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
    p.style.width = (3 + Math.random() * 5) + 'px';
    p.style.height = p.style.width;
    cont.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}

// ════════════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════════════
let ROWS = 30, COLS = 10;
let selectedPattern = 1;
let currentLevel = 1;
let grid = [];
let playerR = 0, playerC = 0;
let prevR = 0, prevC = 0;
let lives = 5, score = 0, totalBlue = 0;
let timeLeft = 30;
let timerInterval = null;
let gameStarted = false, gameOver = false;

const T = { EMPTY: 'empty', BLUE: 'blue', RED: 'red', GREEN: 'green' };

// ════════════════════════════════════════════════════
// SETUP CONTROLS
// ════════════════════════════════════════════════════
function setPattern(p) {
  selectedPattern = p;
  document.getElementById('btnP1').classList.toggle('active-pattern', p === 1);
  document.getElementById('btnP2').classList.toggle('active-pattern', p === 2);
}

function generateGrid() {
  ROWS = Math.max(10, parseInt(document.getElementById('rowsInput').value) || 30);
  COLS = Math.max(10, parseInt(document.getElementById('colsInput').value) || 10);
  document.getElementById('rowsInput').value = ROWS;
  document.getElementById('colsInput').value = COLS;
  currentLevel = selectedPattern;
  resetGame();
}

function resetGame() {
  clearInterval(timerInterval);
  timerInterval = null;
  lives = 5; score = 0; timeLeft = 30;
  gameStarted = false; gameOver = false;

  currentLevel === 1 ? buildPattern1() : buildPattern2();
  totalBlue = countBlue();

  // Place player at bottom-left safe cell
  playerR = ROWS - 1; playerC = 0;
  findSafeStart();
  grid[playerR][playerC] = T.EMPTY;
  prevR = playerR; prevC = playerC;

  document.getElementById('hud').classList.add('show');
  hideOverlay();
  updateHUD();
  renderGrid();
}

function findSafeStart() {
  if (grid[playerR][playerC] !== T.RED && grid[playerR][playerC] !== T.BLUE) return;
  for (let c = 0; c < COLS; c++) {
    if (grid[ROWS-1][c] === T.EMPTY || grid[ROWS-1][c] === T.GREEN) {
      playerC = c; return;
    }
  }
  for (let r = ROWS - 1; r >= 0; r--) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === T.EMPTY || grid[r][c] === T.GREEN) {
        playerR = r; playerC = c; return;
      }
    }
  }
}

// ════════════════════════════════════════════════════
// PATTERN 1 — INTERLOCKING DIAMONDS
// ════════════════════════════════════════════════════
function buildPattern1() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(T.EMPTY));

  const centerC = Math.floor(COLS / 2);
  // Diamond half-height adapts to columns
  const halfH = Math.max(3, Math.floor(COLS / 2) - 1);

  // Draw repeating interlocking diamonds down the grid
  let row = 0;
  while (row < ROWS - 1) {
    // ── Top-half of diamond (expanding) ──
    for (let i = 0; i <= halfH && row + i < ROWS - 1; i++) {
      const r = row + i;
      const left  = centerC - i;
      const right = centerC + i;
      if (left >= 0 && left < COLS)  grid[r][left]  = T.RED;
      if (right >= 0 && right < COLS && right !== left) grid[r][right] = T.RED;
    }
    // ── Bottom-half of diamond (contracting) ──
    for (let i = 1; i <= halfH && row + halfH + i < ROWS - 1; i++) {
      const r = row + halfH + i;
      const span = halfH - i;
      const left  = centerC - span;
      const right = centerC + span;
      if (left >= 0 && left < COLS)  grid[r][left]  = T.RED;
      if (right >= 0 && right < COLS && right !== left) grid[r][right] = T.RED;
    }

    // Blue tiles at the diamond's top vertex (peak)
    if (row < ROWS - 1) {
      if (centerC - 1 >= 0) grid[row][centerC - 1] = T.BLUE;
      if (centerC + 1 < COLS) grid[row][centerC + 1] = T.BLUE;
    }

    // Blue tiles at the widest point (left & right edges)
    const wideRow = row + halfH;
    if (wideRow < ROWS - 1) {
      // Place blue just outside the diamond edges
      const outerL = centerC - halfH - 1;
      const outerR = centerC + halfH + 1;
      if (outerL >= 0) grid[wideRow][outerL] = T.BLUE;
      if (outerR < COLS) grid[wideRow][outerR] = T.BLUE;
      // And at the far edges
      if (0 < outerL) grid[wideRow][0] = T.BLUE;
      if (COLS - 1 > outerR) grid[wideRow][COLS - 1] = T.BLUE;
    }

    // Blue tiles at the bottom vertex (valley)
    const bottomVertex = row + halfH * 2;
    if (bottomVertex < ROWS - 1) {
      if (centerC - 1 >= 0) grid[bottomVertex][centerC - 1] = T.BLUE;
      if (centerC + 1 < COLS) grid[bottomVertex][centerC + 1] = T.BLUE;
    }

    // Move to next diamond (they interlock, sharing the bottom vertex)
    row += halfH * 2;
  }

  // Bottom row = all GREEN
  for (let c = 0; c < COLS; c++) grid[ROWS - 1][c] = T.GREEN;

  // Scatter a few extra blue tiles in remaining empty space
  let extra = 0, attempts = 0;
  const targetExtra = Math.floor(ROWS * COLS * 0.015);
  while (extra < targetExtra && attempts < 500) {
    const r = Math.floor(Math.random() * (ROWS - 1));
    const c = Math.floor(Math.random() * COLS);
    if (grid[r][c] === T.EMPTY) { grid[r][c] = T.BLUE; extra++; }
    attempts++;
  }
}

// ════════════════════════════════════════════════════
// PATTERN 2 — MAZE (Recursive Backtracker)
// ════════════════════════════════════════════════════
function buildPattern2() {
  grid = Array.from({ length: ROWS }, () => Array(COLS).fill(T.GREEN));
  const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));

  function carve(r, c) {
    visited[r][c] = true;
    grid[r][c] = T.EMPTY;
    for (const [dr, dc] of shuffle([[0,2],[0,-2],[2,0],[-2,0]])) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc]) {
        grid[r + dr / 2][c + dc / 2] = T.EMPTY;
        carve(nr, nc);
      }
    }
  }
  carve(1, 1);

  // Ensure corners are reachable
  grid[ROWS - 1][0] = T.EMPTY;
  grid[ROWS - 2][0] = T.EMPTY;
  if (ROWS > 2) grid[ROWS - 3][0] = T.EMPTY;

  // Scatter blue points
  let placed = 0, att = 0;
  const target = 12 + Math.floor(Math.random() * 10);
  while (placed < target && att < 600) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    if (grid[r][c] === T.EMPTY && !(r === ROWS - 1 && c === 0)) { grid[r][c] = T.BLUE; placed++; }
    att++;
  }

  // Place red hazards at choke points
  let rp = 0; att = 0;
  const rTarget = 5 + Math.floor(Math.random() * 5);
  while (rp < rTarget && att < 400) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    if (grid[r][c] === T.EMPTY && !(r === ROWS - 1 && c === 0)) { grid[r][c] = T.RED; rp++; }
    att++;
  }
}

function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ════════════════════════════════════════════════════
// RENDER GRID
// ════════════════════════════════════════════════════
function renderGrid() {
  const container = document.getElementById('gridContainer');
  const maxW = window.innerWidth - 40;
  const maxH = window.innerHeight - 360;
  const cellSize = Math.max(16, Math.min(Math.floor(maxW / COLS), Math.floor(maxH / ROWS), 36));

  container.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
  container.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`;
  container.innerHTML = '';

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;

      const num = r * COLS + c + 1; // consecutive numbering

      if (r === playerR && c === playerC) {
        cell.classList.add('cell-player');
        cell.textContent = '★';
      } else {
        switch (grid[r][c]) {
          case T.BLUE:  cell.classList.add('cell-blue');  break;
          case T.RED:   cell.classList.add('cell-red');   break;
          case T.GREEN: cell.classList.add('cell-green'); break;
          default:      cell.classList.add('cell-empty'); cell.textContent = num; break;
        }
      }

      if (!gameOver && isAdj(r, c)) cell.classList.add('cell-adjacent');
      cell.addEventListener('click', () => handleMove(r, c));
      container.appendChild(cell);
    }
  }
}

// ════════════════════════════════════════════════════
// MOVEMENT
// ════════════════════════════════════════════════════
function isAdj(r, c) { return Math.abs(r - playerR) + Math.abs(c - playerC) === 1; }

function handleMove(r, c) {
  if (gameOver || !isAdj(r, c)) return;
  ensureAudio();

  if (!gameStarted) { gameStarted = true; startTimer(); }

  const tile = grid[r][c];

  // ── RED TILE: flash, lose life, stay in place ──
  if (tile === T.RED) {
    sfxHit();
    const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if (el) { el.classList.remove('cell-flash'); void el.offsetWidth; el.classList.add('cell-flash'); }

    // screen shake
    const wrapper = document.getElementById('gridWrapper');
    wrapper.classList.remove('shake'); void wrapper.offsetWidth; wrapper.classList.add('shake');

    // red particle burst
    if (el) {
      const rect = el.getBoundingClientRect();
      spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, 'var(--red)', 12);
    }

    lives--;
    updateHUD();
    if (lives <= 0) endGame(false);
    return;
  }

  // ── MOVE PLAYER ──
  sfxMove();
  prevR = playerR; prevC = playerC;
  playerR = r; playerC = c;

  // ── BLUE TILE: collect ──
  if (tile === T.BLUE) {
    sfxCollect();
    score++;
    grid[r][c] = T.EMPTY;

    // particles
    const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if (el) {
      const rect = el.getBoundingClientRect();
      spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, 'var(--blue)', 14);
    }
  }

  updateHUD();
  renderGrid();

  // ── WIN CHECK ──
  if (score >= totalBlue) {
    currentLevel === 1 ? showLevelComplete() : endGame(true);
  }
}

// Arrow keys
document.addEventListener('keydown', e => {
  if (gameOver) return;
  let nr = playerR, nc = playerC;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W':    nr--; break;
    case 'ArrowDown': case 's': case 'S':  nr++; break;
    case 'ArrowLeft': case 'a': case 'A':  nc--; break;
    case 'ArrowRight': case 'd': case 'D': nc++; break;
    default: return;
  }
  e.preventDefault();
  if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) handleMove(nr, nc);
});

// ════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateHUD();
    if (timeLeft <= 0) { clearInterval(timerInterval); endGame(false); }
  }, 1000);
}

// ════════════════════════════════════════════════════
// HUD
// ════════════════════════════════════════════════════
function updateHUD() {
  // Hearts
  let h = '';
  for (let i = 0; i < 5; i++) h += i < lives ? '❤' : '<span class="heart-lost">🖤</span>';
  document.getElementById('hudHearts').innerHTML = h;

  // Timer
  const timerEl = document.getElementById('hudTimer');
  const m = Math.floor(Math.max(timeLeft, 0) / 60);
  const s = String(Math.max(timeLeft, 0) % 60).padStart(2, '0');
  timerEl.textContent = `${m}:${s}`;
  timerEl.classList.toggle('timer-danger', timeLeft <= 10 && timeLeft > 0);

  // Score
  document.getElementById('hudScore').textContent = `${score} / ${totalBlue}`;

  // Level
  document.getElementById('hudLevel').textContent = currentLevel === 1 ? 'DIAMONDS' : 'MAZE';
}

function countBlue() {
  let n = 0;
  for (const row of grid) for (const c of row) if (c === T.BLUE) n++;
  return n;
}

// ════════════════════════════════════════════════════
// END GAME / LEVEL TRANSITION
// ════════════════════════════════════════════════════
function endGame(won) {
  gameOver = true;
  clearInterval(timerInterval);
  renderGrid();

  const icon  = document.getElementById('overlayIcon');
  const title = document.getElementById('overlayTitle');
  const msg   = document.getElementById('overlayMsg');
  const stats = document.getElementById('overlayStats');
  const btn   = document.getElementById('overlayBtn');

  if (won) {
    sfxWin();
    icon.textContent = '🏆';
    title.className = 'win-text';
    title.textContent = 'YOU WIN!';
    msg.textContent = 'All targets collected. Mission accomplished!';
  } else {
    sfxLose();
    icon.textContent = '💀';
    title.className = 'lose-text';
    title.textContent = 'GAME OVER';
    msg.textContent = lives <= 0 ? 'All lives lost.' : 'Time expired.';
  }

  stats.innerHTML = `
    <div class="overlay-stat"><div class="overlay-stat-val">${score}</div><div class="overlay-stat-label">Collected</div></div>
    <div class="overlay-stat"><div class="overlay-stat-val">${totalBlue}</div><div class="overlay-stat-label">Total</div></div>
    <div class="overlay-stat"><div class="overlay-stat-val">${lives}</div><div class="overlay-stat-label">Lives Left</div></div>
  `;

  btn.textContent = 'PLAY AGAIN';
  btn.onclick = playAgain;
  showOverlay();
}

function showLevelComplete() {
  clearInterval(timerInterval);
  gameOver = true;
  sfxWin();

  const icon  = document.getElementById('overlayIcon');
  const title = document.getElementById('overlayTitle');
  const msg   = document.getElementById('overlayMsg');
  const stats = document.getElementById('overlayStats');
  const btn   = document.getElementById('overlayBtn');

  icon.textContent = '⚡';
  title.className = 'lvl-text';
  title.textContent = 'LEVEL COMPLETE!';
  msg.textContent = 'Diamond field cleared! Entering the maze...';
  stats.innerHTML = `
    <div class="overlay-stat"><div class="overlay-stat-val">${score}</div><div class="overlay-stat-label">Points</div></div>
    <div class="overlay-stat"><div class="overlay-stat-val">${lives}</div><div class="overlay-stat-label">Lives Left</div></div>
  `;

  btn.textContent = 'CONTINUE →';
  btn.onclick = () => {
    currentLevel = 2;
    score = 0; timeLeft = 30;
    gameStarted = false; gameOver = false;
    buildPattern2();
    totalBlue = countBlue();
    playerR = ROWS - 1; playerC = 0;
    findSafeStart();
    grid[playerR][playerC] = T.EMPTY;
    prevR = playerR; prevC = playerC;
    hideOverlay();
    updateHUD();
    renderGrid();
  };
  showOverlay();
}

function showOverlay() { document.getElementById('overlay').classList.add('visible'); }
function hideOverlay() { document.getElementById('overlay').classList.remove('visible'); }
function playAgain() { currentLevel = selectedPattern; hideOverlay(); resetGame(); }

// ════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════
generateGrid();
</script>
